<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2023 · 初见 | 拾光·毕业纪</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="insite.css">
    <style>
        /* 全局重置与轮播样式（确保轮播生效） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .fullscreen-carousel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            z-index: 0;
        }
        .carousel-slide.active {
            opacity: 1;
            z-index: 1;
        }
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .overlay-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3), rgba(0,0,0,0.5));
            z-index: 1;
            pointer-events: none;
        }
        .content-container {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .page-header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease;
        }
        .page-title {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD700, #FFA500, #F06292);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .page-subtitle {
            font-size: 1.3rem;
            color: rgba(255,255,255,0.9);
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            padding-bottom: 15px;
        }
        .page-subtitle::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #FFD700, #F06292);
        }
        .memory-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s ease 0.2s both;
        }
        .memory-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255,215,0,0.3);
        }
        .memory-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FFD700, #F06292);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }
        .memory-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #FFD700;
        }
        .text-editor {
            width: 100%;
            min-height: 280px;
            padding: 20px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1.05rem;
            resize: vertical;
            outline: none;
            backdrop-filter: blur(5px);
            line-height: 1.8;
            margin-bottom: 25px;
        }
        .text-editor:focus {
            border-color: #FFD700;
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }
        .save-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #FFD700, #F06292);
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,215,0,0.3);
        }
        .back-home-btn {
            padding: 12px 30px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .back-home-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-3px);
            border-color: rgba(255,215,0,0.5);
        }
        .carousel-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }
        .carousel-controls:hover {
            opacity: 1;
        }
        .carousel-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        .carousel-btn:hover {
            background: linear-gradient(135deg, #FFD700, #F06292);
            transform: scale(1.1);
            border-color: transparent;
        }
        .carousel-dots {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .dot.active {
            background: #FFD700;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .add-photo-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        .add-photo-btn:hover {
            background: linear-gradient(135deg, #FFD700, #F06292);
            transform: scale(1.1);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 768px) {
            .content-container {
                padding: 40px 20px;
            }
            .page-title {
                font-size: 2.5rem;
            }
            .page-subtitle {
                font-size: 1rem;
            }
            .memory-card {
                padding: 25px;
            }
            .memory-title {
                font-size: 1.4rem;
            }
            .text-editor {
                min-height: 200px;
                font-size: 0.95rem;
            }
            .button-group {
                flex-direction: column;
            }
            .save-btn, .back-home-btn {
                width: 100%;
                justify-content: center;
            }
            .carousel-controls, .carousel-dots {
                bottom: 20px;
            }
            .carousel-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 轮播容器，动态添加图片 -->
    <div class="fullscreen-carousel" id="fullscreenCarousel"></div>
    <div class="overlay-mask"></div>

    <div class="content-container">
        <div class="page-header">
            <h1 class="page-title">2023 · 初见</h1>
            <p class="page-subtitle">踏入校门，初见如故</p>
        </div>
        <div class="memory-card">
            <div class="memory-header">
                <div class="memory-icon"><i class="fas fa-pen-fancy"></i></div>
                <h2 class="memory-title">回忆与感悟</h2>
            </div>
            <textarea class="text-editor" id="memoryText" placeholder="写下2023年你踏入校园的心情、第一次的校园体验、认识的新朋友..."></textarea>
            <div class="button-group">
                <button class="save-btn" id="saveBtn"><i class="fas fa-save"></i> 保存回忆记录</button>
                <a href="website.html" class="back-home-btn"><i class="fas fa-home"></i> 返回时光轴首页</a>
            </div>
        </div>
    </div>

    <div class="carousel-controls">
        <button class="carousel-btn" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
        <button class="carousel-btn" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="carousel-dots" id="dotsContainer"></div>
    <button class="add-photo-btn" id="addPhotoBtn"><i class="fas fa-plus"></i></button>
    <input type="file" id="photoInput" accept="image/*" style="display: none;">

    <script>
        (function() {
            // 配置
            const YEAR = '2023';
            const STORAGE_IMAGES = `${YEAR}_carousel_images`;
            const STORAGE_MEMORY = `${YEAR}_memory_text`;

            // 默认图片（请确保这些图片存在）
            const DEFAULT_IMAGES = [
                './images/1-1-5.jpg',
                './images/1-1-1.jpg',
                './images/1-1-2.jpg',
                './images/1-1-3.jpg',
                './images/1-1-4.jpg',
                './images/1-1-11.jpg',
                './images/1-1-12.jpg',
                './images/1-1-13.jpg'
            ];

            // DOM 元素
            const carouselEl = document.getElementById('fullscreenCarousel');
            const dotsContainer = document.getElementById('dotsContainer');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const addPhotoBtn = document.getElementById('addPhotoBtn');
            const photoInput = document.getElementById('photoInput');
            const memoryTextarea = document.getElementById('memoryText');
            const saveBtn = document.getElementById('saveBtn');

            // 状态
            let images = [];
            let currentIndex = 0;
            let autoTimer = null;

            // 渲染轮播（重建所有 .carousel-slide 和指示点）
            function renderCarousel() {
                if (!carouselEl) return;
                // 清空容器，重新构建
                carouselEl.innerHTML = '';
                images.forEach((src, idx) => {
                    const slide = document.createElement('div');
                    slide.className = `carousel-slide ${idx === currentIndex ? 'active' : ''}`;
                    slide.innerHTML = `<img src="${src}" alt="回忆照片">`;
                    carouselEl.appendChild(slide);
                });

                // 重建指示点
                dotsContainer.innerHTML = '';
                images.forEach((_, idx) => {
                    const dot = document.createElement('div');
                    dot.className = `dot ${idx === currentIndex ? 'active' : ''}`;
                    dot.addEventListener('click', (e) => {
                        e.stopPropagation();
                        goToSlide(idx);
                    });
                    dotsContainer.appendChild(dot);
                });
            }

            // 跳转到指定图片
            function goToSlide(index) {
                if (!images.length) return;
                if (index < 0) index = images.length - 1;
                if (index >= images.length) index = 0;
                if (currentIndex === index) return;
                currentIndex = index;
                renderCarousel();
                resetAutoPlay();
                // 保存图片数组到 localStorage
                localStorage.setItem(STORAGE_IMAGES, JSON.stringify(images));
                console.log(`切换到第 ${currentIndex + 1} 张`);
            }

            // 下一张
            function nextSlide() {
                goToSlide(currentIndex + 1);
            }

            // 上一张
            function prevSlide() {
                goToSlide(currentIndex - 1);
            }

            // 自动轮播
            function startAutoPlay() {
                if (autoTimer) clearInterval(autoTimer);
                if (images.length > 1) {
                    autoTimer = setInterval(() => {
                        nextSlide();
                    }, 5000);
                }
            }

            function resetAutoPlay() {
                if (autoTimer) clearInterval(autoTimer);
                startAutoPlay();
            }

            // 加载轮播图片（从 localStorage 或默认）
            function loadCarousel() {
                const saved = localStorage.getItem(STORAGE_IMAGES);
                if (saved) {
                    try {
                        images = JSON.parse(saved);
                        if (!Array.isArray(images) || images.length === 0) {
                            images = [...DEFAULT_IMAGES];
                        }
                    } catch (e) {
                        images = [...DEFAULT_IMAGES];
                    }
                } else {
                    images = [...DEFAULT_IMAGES];
                }
                currentIndex = 0;
                renderCarousel();
                startAutoPlay();
            }

            // 添加照片（用户上传）
            function addPhoto(file) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const newSrc = e.target.result;
                    images.push(newSrc);
                    // 保存图片数组
                    localStorage.setItem(STORAGE_IMAGES, JSON.stringify(images));
                    // 跳转到新图片
                    goToSlide(images.length - 1);
                    alert('✨ 照片已添加到轮播！');
                };
                reader.readAsDataURL(file);
            }

            // 文字保存
            function loadMemory() {
                const saved = localStorage.getItem(STORAGE_MEMORY);
                if (saved !== null) {
                    memoryTextarea.value = saved;
                }
            }

            saveBtn.addEventListener('click', function() {
                const text = memoryTextarea.value;
                localStorage.setItem(STORAGE_MEMORY, text);
                alert('✨ 回忆记录已保存！');
            });

            // 事件绑定
            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                prevSlide();
            });
            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                nextSlide();
            });
            addPhotoBtn.addEventListener('click', () => photoInput.click());
            photoInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) {
                    addPhoto(e.target.files[0]);
                }
                photoInput.value = '';
            });

            // 鼠标悬停暂停自动轮播
            carouselEl.addEventListener('mouseenter', () => {
                if (autoTimer) clearInterval(autoTimer);
            });
            carouselEl.addEventListener('mouseleave', () => {
                startAutoPlay();
            });

            // 初始化
            loadCarousel();
            loadMemory();
        })();
    </script>
</body>
</html>
